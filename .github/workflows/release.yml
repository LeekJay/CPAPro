name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.2.3'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all-in-one HTML
        run: bun run build
        env:
          VERSION: ${{ env.RELEASE_TAG }}

      - name: Verify release asset
        run: |
          test -f dist/management.html
          test ! -f dist/index.html
          ls -lh dist/management.html

      - name: Upload management.html artifact
        uses: actions/upload-artifact@v4
        with:
          name: management-html
          path: dist/management.html
          if-no-files-found: error

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${RELEASE_TAG}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"

          if git rev-parse --verify "${current_tag}^{commit}" >/dev/null 2>&1 && [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
            git log --pretty=format:"- %h %s" "${range}" > release-notes.md
          elif git rev-parse --verify "${current_tag}^{commit}" >/dev/null 2>&1; then
            git log --pretty=format:"- %h %s" "${current_tag}" > release-notes.md
          else
            echo "- Manual release for ${current_tag}" > release-notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
